<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased page-contact">
    <nav id="main-nav" class="nav-main">
            <div class="nav-container">
                <div class="nav-logo">
                    <img src="images/headerlogo.png" alt="Studio Bicolor ロゴ" class="site-logo-image" />
                </div>
                <div class="nav-menu-desktop">
                    <a href="index.html" class="nav-link">TOP</a>
                    <a href="works.html" class="nav-link">WORKS</a>
                    <a href="contact.html" class="nav-link" aria-current="page">CONTACT</a>
                </div>
                <!-- Mobile Menu Icon (Placeholder) -->
                <div class="nav-menu-mobile-toggle md:hidden">
                    <button id="menu-toggle" type="button" aria-label="メニューを開く" aria-expanded="false" class="btn-menu-toggle">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                        </svg>
                    </button>
                </div>
            </div>
            <div id="mobile-menu" class="mobile-menu hidden">
                <button id="mobile-menu-backdrop" type="button" aria-label="メニューを閉じる" class="mobile-menu-backdrop"></button>
                <div id="mobile-menu-panel" class="mobile-menu-panel translate-x-full">
                    <div class="mobile-menu-header">
                        <button id="menu-close" type="button" aria-label="メニューを閉じる" class="btn-menu-close">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    <div class="mobile-menu-links">
                        <a href="index.html" class="mobile-menu-link">TOP</a>
                        <a href="works.html" class="mobile-menu-link">WORKS</a>
                        <a href="contact.html" class="mobile-menu-link" aria-current="page">CONTACT</a>
                    </div>
                    <div class="mobile-menu-label">MENU</div>
                </div>
            </div>
    </nav>
    <main class="page-main">
        <section class="section-contact">
            <div class="section-container section-container-contact">
                <h2 class="section-title section-title-contact">CONTACT</h2>
                <p class="contact-intro">制作のご相談・ご依頼<br>採用に関するお問い合わせは<br>下記フォームよりご連絡ください。</p>
                <form class="contact-form" action="#" method="post" novalidate>
                    <div class="contact-form-group">
                        <label class="contact-form-label" for="contact-name">お名前</label>
                        <input id="contact-name" name="your-name" type="text" class="contact-form-input contact-form-input-text" autocomplete="name" required>
                    </div>
                    <div class="contact-form-group">
                        <label class="contact-form-label" for="contact-email">メールアドレス</label>
                        <input id="contact-email" name="your-email" type="email" class="contact-form-input contact-form-input-text" autocomplete="email" inputmode="email" required>
                    </div>
                    <div class="contact-form-group">
                        <label class="contact-form-label" for="contact-message">お問い合わせ内容</label>
                        <textarea id="contact-message" name="your-message" rows="4" class="contact-form-input contact-form-textarea" required></textarea>
                    </div>
                    <div class="sr-only" aria-hidden="true">
                        <label for="company-url">会社URL</label>
                        <input id="company-url" name="company-url" type="text" tabindex="-1" autocomplete="off">
                    </div>
                    <p class="contact-form-note">※ WordPress化の際は Contact Form 7 などに差し替えやすい name 設計にしています。</p>
                    <div class="contact-form-submit">
                        <button type="submit" class="btn-contact-submit">送信する</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-logo">
                <div class="footer-logo-text"><img src="images/footer_logo.png" alt="Studio Bicolor ロゴ" class="site-logo-image" /></div>
                <p class="footer-copyright">&copy; 2026 Studio Bicolor Inc.</p>
            </div>
            <div class="footer-social">
                <a href="#" class="footer-social-link">
                    <span class="footer-social-label">X (Twitter)</span>
                    <svg class="footer-social-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                </a>
                <a href="#" class="footer-social-link">
                    <span class="footer-social-label">YouTube</span>
                    <svg class="footer-social-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                </a>
            </div>
        </div>
    </footer>
    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
